<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - Paper Trader</title>
  <meta name="root-path" content="/paper-trader">
  <link rel="stylesheet" href="./static/style.css?v=20260504ah">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <p class="eyebrow">Paper Research · Protected</p>
      <h1 class="login-title">Paper Trader</h1>
      <p class="login-subtitle">추천/검증 대시보드에 접근하려면 로그인하세요.</p>
      <form id="login-form">
        <div class="form-group"><label for="login-id">아이디</label><input id="login-id" autocomplete="username" required autofocus></div>
        <div class="form-group"><label for="password">비밀번호</label><input id="password" type="password" autocomplete="current-password" required></div>
        <div id="error-msg" class="error-msg"></div>
        <button type="submit" id="btn-login">로그인</button>
      </form>
    </div>
  </div>
<script>
const ROOT=(document.querySelector('meta[name="root-path"]')?.content||'').replace(/\/$/, '');
function safeNextPath(){
  const params = new URLSearchParams(location.search);
  const raw = params.get('next') || '/dashboard';
  if (!raw.startsWith('/') || raw.startsWith('//') || raw.includes('://')) return '/dashboard';
  if (raw === '/login' || raw.startsWith('/login?')) return '/dashboard';
  return raw;
}
document.getElementById('login-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const username=document.getElementById('login-id').value.trim();
  const password=document.getElementById('password').value;
  const err=document.getElementById('error-msg'); const btn=document.getElementById('btn-login');
  err.textContent=''; btn.disabled=true; btn.textContent='로그인 중...';
  try{
    const r=await fetch(`${ROOT}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    if(!r.ok){const data=await r.json().catch(()=>({})); throw new Error(data.detail||'로그인에 실패했습니다.');}
    sessionStorage.setItem('pt_basic_auth', 'Basic '+btoa(`${username}:${password}`));
    location.href=`${ROOT}${safeNextPath()}`;
  }catch(ex){err.textContent=ex.message||'네트워크 오류가 발생했습니다.'; btn.disabled=false; btn.textContent='로그인';}
});
</script>
</body>
</html>
